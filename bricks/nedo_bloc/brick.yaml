name: nedo_bloc
description: Generate BLoC pattern boilerplate with basic states (Initial, Loading, Loaded, Error) and fetch event
version: 1.0.0
repository: https://github.com/SaifMusyanto/nedo-cli

vars:
  # Hanya menanyakan informasi inti
  name:
    type: string
    description: Feature name (e.g., user, product)
    prompt: What is the feature name?
    default: feature

  data_type:
    type: string
    description: Data type (e.g., List<User>, Product)
    prompt: What is the data type?
    default: dynamic

  use_equatable:
    type: boolean
    description: Use Equatable
    prompt: Use Equatable?
    default: true
